name = "freshdesk-proxy"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Segredos (nunca ficam neste arquivo, são configurados com `wrangler secret put`):
# - FRESHDESK_DOMAIN  (ex: hebevi.freshdesk.com)
# - FRESHDESK_API_KEY (a API Key do Freshdesk)
# - APP_TOKEN         (a senha de equipe que o site vai pedir ao atendente)

# Guarda os contadores semanais de risco de chargeback (painel de estatísticas).
[[kv_namespaces]]
binding = "RISK_STATS"
id = "adec800009d342f3bfa21634476f69c4"

# Roda `scheduled()` 1x por dia, às 12:00 UTC (~09:00 em Brasília), para
# sincronizar as respostas novas da pesquisa de satisfação (CSAT).
[triggers]
crons = ["0 12 * * *"]
